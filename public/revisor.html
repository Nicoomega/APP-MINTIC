<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revisor MINTIC</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- ── Navbar ── -->
  <nav class="app-nav">
    <div class="nav-inner">
      <a href="#" class="brand">
        <div class="brand-icon" style="background:linear-gradient(135deg,#10b981,#059669);">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        </div>
        MINTIC · Revisor
      </a>
      <div class="nav-right">
        <span class="user-label" id="user-greeting"></span>
        <button class="btn-logout" id="logout-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          Salir
        </button>
      </div>
    </div>
  </nav>

  <!-- ── SECCIÓN: LISTA ── -->
  <div id="section-lista" class="page-content">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;">
      <div>
        <h1 style="font-size:1.35rem;font-weight:800;color:#0f172a;letter-spacing:-0.02em;margin:0 0 0.25rem;">Envíos de operadores</h1>
        <p style="font-size:0.85rem;color:#64748b;margin:0;">Revisa y aprueba los registros de beneficiarios.</p>
      </div>
      <div style="display:flex;gap:0.625rem;align-items:center;flex-wrap:wrap;">
        <select id="filtro-status" class="form-control" style="width:auto;font-size:0.82rem;padding:0.45rem 0.75rem;">
          <option value="">Todos los estados</option>
          <option value="pendiente_revision" selected>Pendiente de revisión</option>
          <option value="aprobado">Aprobados</option>
          <option value="rechazado">Rechazados</option>
        </select>
        <button class="btn btn-ghost btn-sm" id="btn-refrescar" title="Refrescar">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          Refrescar
        </button>
      </div>
    </div>

    <div id="lista-container">
      <div style="text-align:center;padding:3rem 1rem;color:#94a3b8;">
        <div class="spinner" style="border-top-color:#059669;margin:0 auto 0.75rem;width:24px;height:24px;border-width:3px;"></div>
        <p style="margin:0;font-size:0.85rem;">Cargando envíos…</p>
      </div>
    </div>
  </div>

  <!-- ── SECCIÓN: PANEL DE REVISIÓN (oculta por defecto) ── -->
  <div id="section-revision" class="page-content d-none">
    <div style="display:flex;align-items:center;gap:0.875rem;margin-bottom:1.75rem;flex-wrap:wrap;">
      <button class="btn btn-ghost btn-sm" id="btn-volver">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        Volver
      </button>
      <div>
        <h2 style="font-size:1.15rem;font-weight:800;color:#0f172a;letter-spacing:-0.02em;margin:0 0 0.1rem;">
          Revisar envío <span id="revision-id" style="color:#64748b;">#—</span>
        </h2>
        <p style="font-size:0.8rem;color:#64748b;margin:0;">Operador: <strong id="revision-operador" style="color:#0f172a;"></strong></p>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1.4fr;gap:1.25rem;align-items:start;">

      <!-- Columna izquierda: documentos -->
      <div class="card">
        <div class="card-header" style="justify-content:flex-start;gap:0.5rem;padding:1rem 1.5rem;">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#059669" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9a2 2 0 00-2 2v5a2 2 0 01-2 2z"/></svg>
          <span style="font-size:0.9rem;font-weight:700;color:#0f172a;">Documentos entregados</span>
        </div>
        <div class="card-body">
          <div id="docs-list"></div>

          <div style="border-top:1px solid #f1f5f9;margin:1rem 0;"></div>

          <p style="font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#94a3b8;margin:0 0 0.625rem;">URLs</p>
          <div style="margin-bottom:0.75rem;">
            <p style="font-size:0.75rem;color:#94a3b8;margin:0 0 0.2rem;">Vitrina</p>
            <a id="url-vitrina" href="#" target="_blank" rel="noopener noreferrer"
               style="font-size:0.82rem;color:#059669;word-break:break-all;">—</a>
          </div>
          <div>
            <p style="font-size:0.75rem;color:#94a3b8;margin:0 0 0.2rem;">Chatbot</p>
            <a id="url-chatbot" href="#" target="_blank" rel="noopener noreferrer"
               style="font-size:0.82rem;color:#059669;word-break:break-all;">—</a>
          </div>
        </div>
      </div>

      <!-- Columna derecha: formulario de evaluación -->
      <div class="card">
        <div class="card-header" style="justify-content:flex-start;gap:0.5rem;padding:1rem 1.5rem;">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#059669" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
          <span style="font-size:0.9rem;font-weight:700;color:#0f172a;">Evaluación</span>
        </div>
        <div class="card-body">
          <p style="font-size:0.82rem;color:#64748b;margin:0 0 1rem;">
            Marca cada criterio. Si es <strong>No cumple</strong>, el comentario es obligatorio.
          </p>

          <div class="alert alert-danger d-none" id="review-alert" style="margin-bottom:1rem;"></div>
          <div class="alert alert-success d-none" id="review-ok" style="margin-bottom:1rem;"></div>

          <form id="review-form" novalidate>
            <input type="hidden" id="reviewing-id" value="" />
            <div id="review-fields-container"></div>

            <div style="display:flex;justify-content:flex-end;gap:0.75rem;margin-top:1.5rem;">
              <button type="button" class="btn btn-ghost btn-sm" id="btn-volver2">Cancelar</button>
              <button type="submit" class="btn btn-primary" id="btn-review-submit">
                <span class="d-none" id="review-spinner">
                  <svg class="spinner" style="border-top-color:#fff;width:14px;height:14px;" viewBox="0 0 24 24"></svg>
                </span>
                <span id="review-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                </span>
                <span id="review-btn-label">Enviar revisión</span>
              </button>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="/js/revisor.js"></script>
</body>
</html>
