<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard · Cuestionario MINTIC</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="bg-light">

  <!-- Barra de navegación -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
      <span class="navbar-brand fw-bold">
        <i class="fas fa-clipboard-list me-2"></i>Cuestionario MINTIC
      </span>
      <div class="d-flex align-items-center gap-2 flex-wrap">
        <span class="text-white small" id="user-greeting"></span>
        <a href="/questionnaire.html" class="btn btn-outline-light btn-sm">
          <i class="fas fa-plus me-1"></i>Nuevo registro
        </a>
        <button class="btn btn-outline-light btn-sm" id="logout-btn">
          <i class="fas fa-sign-out-alt me-1"></i>Cerrar sesión
        </button>
      </div>
    </div>
  </nav>

  <div class="container my-5">
    <!-- Encabezado de página -->
    <div class="mb-4">
      <h4 class="fw-bold mb-1" id="page-title">Mis registros</h4>
      <p class="text-muted small mb-0" id="page-subtitle">Historial de cuestionarios enviados</p>
    </div>

    <!-- Contenedor de tarjetas -->
    <div id="responses-container">
      <div class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Cargando...</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: detalle de registro -->
  <div class="modal fade" id="detail-modal" tabindex="-1" aria-labelledby="modal-title" aria-modal="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content border-0 rounded-4">

        <div class="modal-header border-bottom-0 pb-0">
          <h5 class="modal-title fw-bold" id="modal-title">
            <i class="fas fa-file-alt text-primary me-2"></i>Detalle del registro
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>

        <div class="modal-body pt-3" id="modal-body">
          <div class="text-center py-4">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Cargando...</span>
            </div>
          </div>
        </div>

        <div class="modal-footer border-top-0">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
