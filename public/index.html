<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión · MINTIC</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a1628 0%, #0d2e1e 50%, #0a1628 100%);
      padding: 1rem;
    }
    .login-wrap { width: 100%; max-width: 380px; }
    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-logo-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      box-shadow: 0 8px 24px rgba(16,185,129,.35);
    }
    .login-logo-icon svg { width: 30px; height: 30px; color: #fff; }
    .login-logo h1 { font-size: 1.4rem; font-weight: 900; color: #fff; letter-spacing: -0.02em; margin: 0 0 0.25rem; }
    .login-logo p  { font-size: 0.82rem; color: #94a3b8; margin: 0; }
    .login-card { background: #fff; border-radius: 1.25rem; padding: 2rem; box-shadow: 0 24px 64px rgba(0,0,0,.35); }
    .login-card h2 { font-size: 1.1rem; font-weight: 700; color: #0f172a; margin: 0 0 0.25rem; }
    .login-card .sub { font-size: 0.82rem; color: #64748b; margin: 0 0 1.5rem; }
    .login-footer { text-align: center; margin-top: 1.25rem; font-size: 0.76rem; color: #475569; }
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      padding: 0.7rem 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 4px 12px rgba(5,150,105,.35);
      margin-top: 0.25rem;
    }
    .btn-login:hover:not(:disabled)  { opacity: 0.92; }
    .btn-login:active:not(:disabled) { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="login-wrap" id="login-wrap">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
      </div>
      <h1>MINTIC</h1>
      <p>Plataforma de gestión de beneficiarios</p>
    </div>

    <div class="login-card">
      <h2>Bienvenido de nuevo</h2>
      <p class="sub">Ingresa con tus credenciales asignadas</p>

      <div id="alert-box"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email" class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" id="email" name="email"
                 required autocomplete="email" placeholder="correo@ejemplo.com" />
        </div>

        <div class="form-group" style="margin-bottom: 1.5rem;">
          <label for="password" class="form-label">Contraseña</label>
          <div class="password-wrapper">
            <input type="password" class="form-control" id="password" name="password"
                   required autocomplete="current-password" placeholder="••••••••" />
            <button type="button" id="toggle-password" class="toggle-pwd" tabindex="-1" aria-label="Mostrar contraseña">
              <svg id="eye-open" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              <svg id="eye-closed" class="d-none" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="submit-btn">
          <span id="spinner" class="d-none">
            <svg class="spinner" style="border-top-color:#fff;width:16px;height:16px;" viewBox="0 0 24 24"></svg>
          </span>
          Iniciar sesión
        </button>
      </form>
    </div>

    <p class="login-footer">Las credenciales son asignadas por el administrador.</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
